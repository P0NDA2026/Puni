<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puni</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative; /* عشان العنوان يثبت فوق */
        }

        /* تنسيق كلمة Puni كعنوان ثابت فوق */
        .site-title {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #fff; /* لون أبيض منور */
            font-size: 32px;
            font-weight: bold;
            margin: 0;
            z-index: 200; /* عشان يفضل فوق كل حاجة */
        }

        .container {
            width: 95%;
            max-width: 400px;
            margin-top: 50px; /* سيب مسافة للعنوان */
        }

        .log-screen {
            background: #000;
            height: 80vh; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        /* تنسيقات الأسطر السبعة المفرودة */
        .line-1 { 
            font-size: 45px; color: #000; font-weight: bold; 
            background: #fff; display: inline-block; 
            padding: 10px 30px; border-radius: 20px; 
            margin: 0 auto 20px auto; 
        }
        
        .line-2, .line-4 { 
            font-size: 32px; color: #ff3b30; 
            font-style: italic; font-weight: bold; 
            margin: 5px 0;
        }

        .line-3, .line-5, .line-times { 
            font-size: 24px; color: #999; 
            font-weight: bold; 
            margin: 2px 0; 
        }

        .line-6 { 
            font-size: 28px; color: #4cd964; 
            font-weight: bold; 
            margin-top: 15px; 
        }

        /* الأزرار العائمة */
        .round-btn {
            position: fixed;
            bottom: 30px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: none;
            background-color: #fff;
            color: #000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
            z-index: 100;
        }

        #runBtn { right: 25px; }
        #resetBtn { left: 25px; }
        .play-icon { font-size: 50px; margin-left: 5px; } 
        .reset-text { font-size: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 class="site-title">Puni</h1>

    <div class="container">
        <div id="displayArea" class="log-screen">
            <p style="color: #444;">Puni جاهز</p>
        </div>
    </div>

    <button id="runBtn" class="round-btn"><span class="play-icon">▶</span></button>
    <button id="resetBtn" class="round-btn"><span class="reset-text">Re</span></button>

    <script>
        const display = document.getElementById('displayArea');
        const runBtn = document.getElementById('runBtn');
        const resetBtn = document.getElementById('resetBtn');

        function printLine(text, className) {
            const p = document.createElement('p');
            p.innerText = text;
            p.className = className;
            display.appendChild(p);
        }

        runBtn.onclick = function() {
            display.innerHTML = ""; 

            let savedTurns = localStorage.getItem('myTurns');
            if (savedTurns === null) {
                savedTurns = Math.floor(Math.random() * 8) + 5; 
            } else {
                savedTurns = parseInt(savedTurns) - 1;
            }

            if (savedTurns < 0) {
                printLine("FINISH", "line-1");
                localStorage.removeItem('myTurns');
                return;
            }
            localStorage.setItem('myTurns', savedTurns);

            const moves = ["as & co sl & pl", "Ba sl", "Ti sl & pl", "2Ni ste pu", "lo Ni pu cl"];

            // 1.turns
            printLine(savedTurns + " turns", "line-1");

            // 2. حركة 1
            let n1 = Math.floor(Math.random() * 5);
            printLine(moves[n1], "line-2");

            // 3. صعوبة 1
            let n4 = Math.floor(Math.random() * 10);
            printLine(n4 <= 2 ? "easy" : n4 <= 6 ? "medium" : "hard", "line-3");

            // 4. حركة 2
            let n2 = Math.floor(Math.random() * 5);
            while (n2 == n1) { n2 = Math.floor(Math.random() * 5); }
            printLine(moves[n2], "line-4");

            // 5. صعوبة 2 (منفصلة)
            let n5 = Math.floor(Math.random() * 10);
            printLine(n5 <= 2 ? "easy" : n5 <= 6 ? "medium" : "hard", "line-5");

            // 6. التايمز (منفصلة تماماً)
            let t = (Math.floor(Math.random() * 10) + 2) + " times";
            printLine(t, "line-times");

            // 7. الوضع الأخير
            let n7 = Math.floor(Math.random() * 10);
            printLine(n7 <= 2 ? "CO2m" : n7 <= 6 ? "Ju" : "BDSBa", "line-6");
        };

        resetBtn.onclick = function() {
            localStorage.removeItem('myTurns');
            display.innerHTML = '<p style="color:#fff;">RESET DONE</p>';
        };
    </script>
</body>
</html>
